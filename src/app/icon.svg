<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="x" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff3df0"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#43f7ff"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" rx="24" fill="#05030b"/>
  <rect x="4" y="4" width="92" height="92" rx="20" fill="none" stroke="url(#x)" stroke-width="2" opacity="0.5"/>
  <g filter="url(#glow)" stroke="url(#x)" stroke-width="11" stroke-linecap="round">
    <line x1="31" y1="31" x2="69" y2="69"/>
    <line x1="69" y1="31" x2="31" y2="69"/>
  </g>
</svg>
